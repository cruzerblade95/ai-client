name: Feature request
description: Suggest an SDK improvement
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the desired API or behaviour.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: dropdown
    id: provider
    attributes:
      label: Provider scope
      options:
        - Provider-agnostic
        - AWS Bedrock
        - Custom providers
        - New provider
